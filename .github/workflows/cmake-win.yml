name: C/C++ CI Windows

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  release:
    types: [ published ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-windows:

    runs-on: windows-2022
    timeout-minutes: 360

    permissions:
      contents: write
      actions: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: microsoft/setup-msbuild@v1.1
        with:
          vs-version: '17'
          msbuild-architecture: x64

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10.11'

      - name: Install prerequisite python packages
        run: |
          pip install jsondiff

      - name: Cache build dependencies
        id: cache-build-deps
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ github.workspace }}\b\DCMTK-build
            ${{ github.workspace }}\b\DCMTK-install
            ${{ github.workspace }}\b\ITK-build
            ${{ github.workspace }}\b\ITK-install
            ${{ github.workspace }}\b\zlib-install
          key: windows-deps-${{ hashFiles('CMakeExternals/*.cmake') }}
          restore-keys: |
            windows-deps-

      - name: Configure project

        run: |
          ls ${{ github.workspace }}
          echo "WORKSPACE dir: ${{ github.workspace }}"
          cmake --version
          if (-not (Test-Path "${{ github.workspace }}\b")) { mkdir -p "${{ github.workspace }}\b" }
          echo "Step 2"
          cd ${{ github.workspace }}\b
          echo "Step 3"
          cmake -G "Visual Studio 17 2022" -Ax64 -DBUILD_SHARED_LIBS:BOOL=OFF ${{ github.workspace }}

      - name: Build dcmqi
        run: |
          cd ${{ github.workspace }}\b/
          cmake --build . --config Release -- /m

      - name: Test dcmqi
        run: |
          cd ${{ github.workspace }}\b\dcmqi-build
          ctest -VV -C Release -D ExperimentalTest --no-compress-output

      - name: Package dcmqi
        run: |
          cd ${{ github.workspace }}\b\dcmqi-build
          cmake --build . --config Release --target PACKAGE -- /m

      - name: "Upload package as artifact"
        id: upload-artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
            name: dcmqi-build
            path: ${{ github.workspace }}\b\dcmqi-build\dcmqi-*-win64*.zip

      - name: "Upload package as artifact (retry)"
        if: steps.upload-artifact.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
            name: dcmqi-build
            path: ${{ github.workspace }}\b\dcmqi-build\dcmqi-*-win64*.zip

      # Save cache even if a later step (test, package) failed, so deps don't need rebuilding next run
      - name: Save build dependencies cache
        if: always() && steps.cache-build-deps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ github.workspace }}\b\DCMTK-build
            ${{ github.workspace }}\b\DCMTK-install
            ${{ github.workspace }}\b\ITK-build
            ${{ github.workspace }}\b\ITK-install
            ${{ github.workspace }}\b\zlib-install
          key: ${{ steps.cache-build-deps.outputs.cache-primary-key }}

  publish-windows:

    runs-on: windows-2022
    timeout-minutes: 10
    # Only run if the event is not a pull request and the repository owner is QIICR.
    # The latter is to prevent forks from publishing packages even if the owner's token
    # would have sufficient privileges.
    if: ${{ (github.event_name != 'pull_request') && (github.repository_owner == 'QIICR')}}

    needs: build-windows

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: dcmqi-build
          path: ${{ github.workspace }}\b\dcmqi-build

      - name: Publish package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GA_TOKEN }}
        run: |
          TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          if [ -n "$TAG" ]; then
            gh release upload "$TAG" \
              "${{ github.workspace }}/b/dcmqi-build"/dcmqi-*-win64.zip \
              --clobber
          else
            gh release view latest --json assets --jq '.assets[].name' 2>/dev/null \
              | grep "dcmqi-.*-win64-" \
              | xargs -I{} gh release delete-asset latest "{}" --yes || true
            gh release upload latest \
              "${{ github.workspace }}/b/dcmqi-build"/dcmqi-*-win64*.zip \
              --clobber
            gh release edit latest --target $(git rev-parse HEAD)
          fi
